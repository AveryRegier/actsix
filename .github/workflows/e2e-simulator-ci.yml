name: Simulator-backed E2E CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  smoke-and-unit:
    name: Unit + E2E Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout actsix
        uses: actions/checkout@v4

      - name: Prepare local sibling dependencies
        run: |
          git clone --depth 1 https://github.com/AveryRegier/sengo.git ../sengo
          git clone --depth 1 https://github.com/AveryRegier/clox.git ../clox

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run unit coverage and threshold gate
        run: |
          npm run test:coverage
          npm run coverage:check

      - name: Run simulator-backed smoke
        run: npm run e2e:mcp:smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            test-results/**
            test/e2e/playwright-report/**
            coverage/**

  full-e2e:
    name: Full E2E Matrix
    runs-on: ubuntu-latest
    needs: smoke-and-unit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout actsix
        uses: actions/checkout@v4

      - name: Prepare local sibling dependencies
        run: |
          git clone --depth 1 https://github.com/AveryRegier/sengo.git ../sengo
          git clone --depth 1 https://github.com/AveryRegier/clox.git ../clox

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run full simulator-backed E2E
        run: npm run e2e:mcp

      - name: Run E2E coverage mode
        run: npm run e2e:mcp:coverage

      - name: Upload full E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-artifacts
          path: |
            test-results/**
            test/e2e/playwright-report/**
            coverage/e2e/**
