<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Household</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .contacts-container {
            margin-top: 40px;
        }

        .contacts-container h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #333;
        }

        .contacts-container ul {
            list-style-type: none;
            padding: 0;
        }

        .contacts-container li {
            background: #f1f3f5;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit Household</h1>
        <form id="edit-household-form">
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="addressStreet">Street</label>
                <input type="text" id="addressStreet" name="addressStreet">
            </div>
            <div class="form-group">
                <label for="addressCity">City</label>
                <input type="text" id="addressCity" name="addressCity">
            </div>
            <div class="form-group">
                <label for="addressState">State</label>
                <input type="text" id="addressState" name="addressState">
            </div>
            <div class="form-group">
                <label for="addressZipCode">Zip Code</label>
                <input type="text" id="addressZipCode" name="addressZipCode">
            </div>
            <div class="form-group">
                <label for="primaryPhone">Primary Phone</label>
                <input type="tel" id="primaryPhone" name="primaryPhone">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="3"></textarea>
            </div>
            <button type="submit" class="btn">Save Changes</button>
        </form>
    </div>

    <script type="module" src="edit-household-page.js"></script>
</body>
</html>
