<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Login</title>
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <!-- Reusable navigation bar -->
    <div id="site-nav-container"></div>

    <div class="container">
        <div class="header">
            <h1 style="display:flex;align-items:center;justify-content:center;font-size:1.3em;font-weight:400;gap:0.5em;">
                <span style="font-size:1.1em;">🏠</span>
                Deacon Care System
            </h1>
            <p class="subtitle">Manage deacon assignments and member care</p>
        </div>
        <div class="section">
            <form id="emailLoginForm" class="content" novalidate>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="section-button">Send Validation Code</button>
                </div>
            </form>

            <!-- Separate validation form so it doesn't interfere with the email form.
                 It's hidden until an email has been submitted successfully. -->
            <form id="validationForm" class="content" style="display:none;" novalidate>
                <input type="hidden" id="validationEmail" name="email">
                <div class="form-group">
                    <label for="code">Validation code</label>
                    <input type="text" id="code" name="code" placeholder="Enter the validation code">
                </div>
                <div class="form-group" style="display:flex;gap:8px;align-items:center;">
                    <button type="submit" class="section-button">Validate Code</button>
                    <button type="button" id="changeEmailBtn" class="section-button" style="background:#ddd;color:#000;padding:8px 12px;">Change email</button>
                </div>
            </form>
        </div>

        <div class="footer" style="padding:12px;text-align:center;color:#666;font-size:0.9em;">
            <p>Acts 6 Deacon Care System</p>
        </div>
    </div>

    <script type="module" src="email-login-page.js"></script>
</body>
</html>
