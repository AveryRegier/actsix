<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Summary Report</title>
    <link rel="stylesheet" href="site.css">
    <!-- print.css lives in the same folder as this HTML file, use relative path -->
    <link rel="stylesheet" href="print.css" media="print">
    <style>
        @media (max-width: 768px) {
            .assignment-filter-label-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Reusable navigation bar -->
        <div id="site-nav-container"></div>
        <div class="header" style="position:relative;display:flex;align-items:center;justify-content:center;min-height:48px;">
            <h1 style="display:flex;align-items:center;justify-content:center;font-size:1.3em;font-weight:400;gap:0.5em;margin:0;">
                <span style="font-size:1.1em;">📋</span>
                Contact Summary Report
            </h1>
            <div style="position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;">
                <label for="assignmentFilter" style="display:flex;align-items:center;gap:8px;font-weight:500;white-space:nowrap;">
                    <span class="assignment-filter-label-text">Filter</span>
                    <select id="assignmentFilter" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;">
                        <option value="all">All</option>
                        <option value="deacon">Deacon</option>
                        <option value="helper">H.E.L.P.</option>
                    </select>
                </label>
            </div>
        </div>
        <table id="summaryTable" class="summary-table">
            <thead>
                <tr>
                    <th colspan="2">Name</th>
                    <th colspan="2">Assignment</th>
                    <th colspan="2">Last Contact</th>
                    <!-- print-only Notes header to align the Notes column in print; hidden on screen via inline style -->
                    <th rowspan="2" class="notes-col print-only" style="display:none">Summary</th>
                </tr>
                <tr>
                    <th>Last</th>
                    <th>First</th>
                    <th>Make Contact</th>
                    <th>Deacons</th>
                    <th>When</th>
                    <th>Who & How</th>
                    
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be populated by JavaScript -->
            </tbody>
        </table>
    </div>

    <script type="module" src="contact-summary-page.js"></script>
    <script src="contact-summary-print.js"></script>
</body>
</html>
